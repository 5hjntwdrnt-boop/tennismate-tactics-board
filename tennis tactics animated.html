
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TennisMate AI - 戦術ボード（アニメーション版）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
:root {
  --green: #2d7a3a; --brand: #4ade80; --bg: #0d1f13;
  --panel: #111f16; --red: #ef4444;
}
body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
h1 { font-size: 1.1rem; color: var(--brand); margin-bottom: 8px; letter-spacing: 1px; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 8px; }
.btn { padding: 7px 13px; border-radius: 8px; border: 2px solid #2a4a30; background: var(--panel); color: white; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--brand); }
.btn.active { background: var(--green); border-color: var(--brand); color: var(--brand); font-weight: bold; }
.btn.danger:hover { background: var(--red); border-color: var(--red); }
.btn.play-btn { background: #14532d; border-color: var(--brand); color: var(--brand); font-weight: bold; }
.btn.add-btn { background: #1a3a22; border-color: var(--brand); color: var(--brand); }
.color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
.color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border 0.15s, transform 0.15s; }
.color-dot.selected { border-color: white; transform: scale(1.2); }
.timeline-section { width: 100%; max-width: 520px; background: var(--panel); border: 1px solid #2a4a30; border-radius: 10px; padding: 8px 12px; margin-bottom: 8px; }
.timeline-label { font-size: 0.75rem; color: #86efac; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.steps-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; min-height: 32px; }
.step-chip { display: flex; align-items: center; gap: 4px; padding: 4px 6px 4px 10px; background: #1a3a22; border: 1px solid #2a5a32; border-radius: 20px; font-size: 0.75rem; color: #86efac; transition: all 0.15s; }
.step-chip.current { background: var(--green); border-color: var(--brand); color: var(--brand); font-weight: bold; }
.chip-label { cursor: pointer; }
.chip-label:hover { text-decoration: underline; }
.del-btn { width: 16px; height: 16px; border-radius: 50%; background: #3a1a1a; border: 1px solid #7f1d1d; color: #fca5a5; font-size: 10px; line-height: 15px; text-align: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
.del-btn:hover { background: var(--red); color: white; }
.playback-controls { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
.speed-label { font-size: 0.75rem; color: #86efac; }
select.speed-select { background: #1a3a22; color: #86efac; border: 1px solid #2a5a32; border-radius: 6px; padding: 3px 6px; font-size: 0.75rem; }
.court-wrap { position: relative; width: 100%; max-width: 380px; }
canvas#court { display: block; width: 100%; border-radius: 8px; cursor: crosshair; touch-action: none; }
.status { font-size: 0.75rem; color: var(--brand); text-align: center; margin-top: 4px; min-height: 18px; }
.hint { font-size: 0.7rem; color: #4ade8088; text-align: center; margin-top: 6px; line-height: 1.5; }
.anim-bar { width: 100%; max-width: 380px; height: 4px; background: #1a3a22; border-radius: 4px; margin-top: 6px; overflow: hidden; }
.anim-bar-fill { height: 100%; background: var(--brand); width: 0%; }
</style>
</head>
<body>
<h1>🎾 TennisMate AI — 戦術アニメーション</h1>
<div class="toolbar" id="modeToolbar">
  <button class="btn active" data-mode="player">👤 選手</button>
  <button class="btn" data-mode="ball">🎾 ボール</button>
  <button class="btn" data-mode="arrow">➡️ 矢印</button>
  <button class="btn" data-mode="move">✋ 移動</button>
  <button class="btn danger" id="clearBtn">🗑️ クリア</button>
</div>
<div class="color-row">
  <span style="font-size:0.8rem;color:#86efac">カラー：</span>
  <div class="color-dot selected" style="background:#ef4444" data-color="#ef4444"></div>
  <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6"></div>
  <div class="color-dot" style="background:#f59e0b" data-color="#f59e0b"></div>
  <div class="color-dot" style="background:#8b5cf6" data-color="#8b5cf6"></div>
  <div class="color-dot" style="background:#ffffff" data-color="#ffffff"></div>
</div>
<div class="timeline-section">
  <div class="timeline-label">
    <span>📽️ アニメーションステップ</span>
    <span id="stepCount">0 ステップ</span>
  </div>
  <div class="steps-row" id="stepsRow">
    <span style="color:#4a7a52;font-size:0.75rem">ステップを追加してください</span>
  </div>
  <div class="playback-controls">
    <button class="btn add-btn" id="addStepBtn">＋ ステップ追加</button>
    <button class="btn play-btn" id="playBtn">▶ 再生</button>
    <button class="btn" id="stopBtn">⏹ 停止</button>
    <span class="speed-label">速度：</span>
    <select class="speed-select" id="speedSelect">
      <option value="2000">遅い</option>
      <option value="1200" selected>普通</option>
      <option value="600">速い</option>
      <option value="250">超速</option>
    </select>
  </div>
</div>
<div class="court-wrap">
  <canvas id="court" width="380" height="570"></canvas>
  <div class="anim-bar"><div class="anim-bar-fill" id="animBarFill"></div></div>
</div>
<div class="status" id="status">👤 選手モード：コートをクリックして配置</div>
<div class="hint">選手・ボール・矢印を配置 → 「ステップ追加」で記録 → 「再生」でアニメーション！<br>ステップ名をクリック→移動　✕ をクリック→削除</div>
<script>
const canvas=document.getElementById('court'),ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
let mode='player',selectedColor='#ef4444',players=[],balls=[],arrows=[];
let dragging=null,dragOffX=0,dragOffY=0,arrowStart=null;
let steps=[],isPlaying=false,animFrame=null;

function easeInOutCubic(t){return t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
function lerp(a,b,t){return a+(b-a)*t;}

function drawCourt(){
  ctx.fillStyle='#2d7a3a'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(let x=0;x<W;x+=8)for(let y=0;y<H;y+=8)if((x+y)%16===0)ctx.fillRect(x,y,4,4);
  const pad=30,cw=W-pad*2,ch=H-pad*2,cx=pad,cy=pad;
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;
  ctx.strokeRect(cx,cy,cw,ch);
  const sl=cx+cw*0.12,sr=cx+cw*0.88;
  [[sl,cy,sl,cy+ch],[sr,cy,sr,cy+ch]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  const netY=cy+ch/2;
  ctx.lineWidth=3;ctx.strokeStyle='rgba(255,255,255,0.95)';
  ctx.beginPath();ctx.moveTo(cx,netY);ctx.lineTo(cx+cw,netY);ctx.stroke();
  ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,0.9)';
  const sboxH=ch*0.27,mid=(sl+sr)/2;
  [[sl,cy+sboxH,sr,cy+sboxH],[sl,cy+ch-sboxH,sr,cy+ch-sboxH],[mid,cy+sboxH,mid,netY],[mid,netY,mid,cy+ch-sboxH]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px Segoe UI';ctx.textAlign='center';
  ctx.fillText('ネット',W/2,netY-4);
}

function ballArcPos(ax,ay,bx,by,t){
  const et=easeInOutCubic(t);
  const dist=Math.hypot(bx-ax,by-ay);
  const arcH=Math.min(dist*0.35,80);
  return {x:lerp(ax,bx,et), y:lerp(ay,by,et)-Math.sin(t*Math.PI)*arcH};
}

function interpolateState(A,B,t){
  const et=easeInOutCubic(t);
  return {
    players: A.players.map((p,i)=>{const q=B.players[i];return q?{...p,x:lerp(p.x,q.x,et),y:lerp(p.y,q.y,et)}:{...p};}),
    balls: A.balls.map((b,i)=>{const q=B.balls[i];if(!q)return {...b};const pos=ballArcPos(b.x,b.y,q.x,q.y,t);return {...b,...pos,scale:1+Math.sin(t*Math.PI)*0.25};}),
    arrows: A.arrows
  };
}

function drawElements(state){
  const p=state.players||players,b=state.balls||balls,a=state.arrows||arrows;
  a.forEach(ar=>{
    ctx.save();ctx.strokeStyle=ar.color||'white';ctx.lineWidth=2.5;ctx.setLineDash([6,3]);
    ctx.beginPath();ctx.moveTo(ar.x1,ar.y1);ctx.lineTo(ar.x2,ar.y2);ctx.stroke();ctx.setLineDash([]);
    const angle=Math.atan2(ar.y2-ar.y1,ar.x2-ar.x1);
    ctx.fillStyle=ar.color||'white';ctx.beginPath();ctx.moveTo(ar.x2,ar.y2);
    ctx.lineTo(ar.x2-12*Math.cos(angle-0.4),ar.y2-12*Math.sin(angle-0.4));
    ctx.lineTo(ar.x2-12*Math.cos(angle+0.4),ar.y2-12*Math.sin(angle+0.4));
    ctx.closePath();ctx.fill();ctx.restore();
  });
  p.forEach(pl=>{
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;
    ctx.fillStyle=pl.color;ctx.beginPath();ctx.arc(pl.x,pl.y,14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
    ctx.shadowBlur=0;ctx.fillStyle='white';ctx.font='bold 10px Segoe UI';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👤',pl.x,pl.y);ctx.restore();
  });
  b.forEach(bl=>{
    const sc=bl.scale||1,r=9*sc;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath();ctx.ellipse(bl.x,bl.groundY||bl.y+r*0.5,r*0.8,r*0.25,0,0,Math.PI*2);ctx.fill();
    ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=6;
    ctx.fillStyle='#c8f05a';ctx.beginPath();ctx.arc(bl.x,bl.y,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#86a020';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  });
}

function redraw(state){ctx.clearRect(0,0,W,H);drawCourt();drawElements(state||{players,balls,arrows});}

function playAnimation(){
  if(steps.length<2){setStatus('⚠️ ステップが2つ以上必要です');return;}
  isPlaying=true;document.getElementById('playBtn').textContent='⏸ 再生中...';
  const speed=parseInt(document.getElementById('speedSelect').value);
  const fps=60,frames=Math.round(speed/(1000/fps));
  let stepIdx=0,frame=0;
  function tick(){
    if(!isPlaying)return;
    if(stepIdx>=steps.length-1){stopAnimation();return;}
    const t=Math.min(frame/frames,1);
    const interp=interpolateState(steps[stepIdx],steps[stepIdx+1],t);
    redraw(interp);
    const total=frames*(steps.length-1),cur=stepIdx*frames+frame;
    document.getElementById('animBarFill').style.width=(cur/total*100)+'%';
    document.querySelectorAll('.step-chip').forEach((c,i)=>c.classList.toggle('current',i===stepIdx));
    frame++;if(frame>frames){frame=0;stepIdx++;}
    animFrame=requestAnimationFrame(tick);
  }
  tick();
}

function stopAnimation(){
  isPlaying=false;if(animFrame)cancelAnimationFrame(animFrame);
  document.getElementById('playBtn').textContent='▶ 再生';
  document.getElementById('animBarFill').style.width='0%';
  redraw();document.querySelectorAll('.step-chip').forEach(c=>c.classList.remove('current'));
  setStatus('⏹ 停止しました');
}

function addStep(){
  steps.push({players:players.map(p=>({...p})),balls:balls.map(b=>({...b})),arrows:arrows.map(a=>({...a}))});
  updateStepUI();setStatus('✅ ステップ '+steps.length+' を記録しました');
}

function updateStepUI(){
  const row=document.getElementById('stepsRow');
  document.getElementById('stepCount').textContent=steps.length+' ステップ';
  if(steps.length===0){row.innerHTML='<span style="color:#4a7a52;font-size:0.75rem">ステップを追加してください</span>';return;}
  row.innerHTML=steps.map((s,i)=>
    '<div class="step-chip" data-idx="'+i+'"><span class="chip-label">ステップ '+(i+1)+'</span><span class="del-btn" data-delidx="'+i+'">✕</span></div>'
  ).join('');
  row.querySelectorAll('.chip-label').forEach(lbl=>{
    lbl.addEventListener('click',()=>{
      const idx=parseInt(lbl.closest('.step-chip').dataset.idx);
      const s=steps[idx];players=s.players.map(p=>({...p}));balls=s.balls.map(b=>({...b}));arrows=s.arrows.map(a=>({...a}));
      redraw();setStatus('📍 ステップ '+(idx+1)+' に移動');
    });
  });
  row.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();steps.splice(parseInt(btn.dataset.delidx),1);updateStepUI();setStatus('🗑️ ステップを削除しました');
    });
  });
}

function getPos(e){
  const rect=canvas.getBoundingClientRect(),scaleX=W/rect.width,scaleY=H/rect.height;
  const src=e.touches?e.touches[0]:e;
  return {x:(src.clientX-rect.left)*scaleX,y:(src.clientY-rect.top)*scaleY};
}
function hitTest(x,y){
  for(let i=players.length-1;i>=0;i--)if(Math.hypot(x-players[i].x,y-players[i].y)<18)return {type:'player',idx:i};
  for(let i=balls.length-1;i>=0;i--)if(Math.hypot(x-balls[i].x,y-balls[i].y)<14)return {type:'ball',idx:i};
  return null;
}
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchend',e=>{e.preventDefault();onUp(e);},{passive:false});

function onDown(e){
  if(isPlaying)return;const {x,y}=getPos(e);
  if(mode==='move'){const hit=hitTest(x,y);if(hit){dragging=hit;const o=hit.type==='player'?players[hit.idx]:balls[hit.idx];dragOffX=x-o.x;dragOffY=y-o.y;}}
  else if(mode==='arrow'){arrowStart={x,y};}
  else if(mode==='player'){players.push({x,y,color:selectedColor});redraw();}
  else if(mode==='ball'){balls.push({x,y});redraw();}
}
function onMove(e){
  if(isPlaying)return;const {x,y}=getPos(e);
  if(mode==='move'&&dragging){const o=dragging.type==='player'?players[dragging.idx]:balls[dragging.idx];o.x=x-dragOffX;o.y=y-dragOffY;redraw();}
  else if(mode==='arrow'&&arrowStart){redraw();ctx.save();ctx.strokeStyle=selectedColor;ctx.lineWidth=2.5;ctx.setLineDash([6,3]);ctx.beginPath();ctx.moveTo(arrowStart.x,arrowStart.y);ctx.lineTo(x,y);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
}
function onUp(e){
  if(isPlaying)return;
  if(mode==='move'&&dragging){dragging=null;redraw();}
  else if(mode==='arrow'&&arrowStart){
    const {x,y}=e.changedTouches?getPos({touches:e.changedTouches}):getPos(e);
    if(Math.hypot(x-arrowStart.x,y-arrowStart.y)>15)arrows.push({x1:arrowStart.x,y1:arrowStart.y,x2:x,y2:y,color:selectedColor});
    arrowStart=null;redraw();
  }
}

document.getElementById('modeToolbar').addEventListener('click',e=>{
  const btn=e.target.closest('[data-mode]');if(!btn)return;
  mode=btn.dataset.mode;
  document.querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  setStatus({player:'👤 選手モード：コートをクリック',ball:'🎾 ボールモード：コートをクリック',arrow:'➡️ 矢印モード：ドラッグで描く',move:'✋ 移動モード：ドラッグで動かす'}[mode]);
});
document.getElementById('clearBtn').addEventListener('click',()=>{players=[];balls=[];arrows=[];redraw();setStatus('🗑️ クリアしました');});
document.getElementById('addStepBtn').addEventListener('click',addStep);
document.getElementById('playBtn').addEventListener('click',()=>{if(isPlaying)stopAnimation();else playAnimation();});
document.getElementById('stopBtn').addEventListener('click',stopAnimation);
document.querySelectorAll('.color-dot').forEach(dot=>{
  dot.addEventListener('click',()=>{document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));dot.classList.add('selected');selectedColor=dot.dataset.color;});
});
function setStatus(msg){document.getElementById('status').textContent=msg;}
redraw();setStatus('👤 選手モード：コートをクリックして配置');
</script>
</body>
</html>
